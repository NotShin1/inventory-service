services:
  # ==========================================
  # 1. APP SERVICE
  # ==========================================
  app:
    container_name: inventory-app
    image: envyshin/inventory-service:latest
    ports:
      - "127.0.0.1:8080:8080"           # Chỉ map localhost
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    networks:
      - inventory-network
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://localhost:8080/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ==========================================
  # 2. DATABASE SERVICE
  # ==========================================
  postgres:
    image: postgres:15-alpine
    container_name: inventory-db
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "127.0.0.1:5432:5432"           # 🔥 SECURE: Chỉ localhost mới chọc được vào DB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - inventory-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 3. PROMETHEUS (SECURE MODE & FIXED ENTRYPOINT)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: inventory-prometheus
    user: root # Cần root để sửa file config
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    environment:
      - APP_ADMIN_USERNAME=${APP_ADMIN_USERNAME}
      - APP_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}

    # 🔥 FIX LỖI CRASH: Dùng 'entrypoint' để override mặc định của Image
    entrypoint:
      - /bin/sh
      - -c
      - |
        echo ">>> Dang cau hinh Prometheus..."
        cp /etc/prometheus/prometheus.yml /prometheus/prometheus.yml && \
        sed -i "s|PLACEHOLDER_USERNAME|$APP_ADMIN_USERNAME|g" /prometheus/prometheus.yml && \
        sed -i "s|PLACEHOLDER_PASSWORD|$APP_ADMIN_PASSWORD|g" /prometheus/prometheus.yml && \
        echo ">>> Chay Prometheus..."
        /bin/prometheus --config.file=/prometheus/prometheus.yml --storage.tsdb.path=/prometheus

    ports:
      - "127.0.0.1:9090:9090"           # 🔥 SECURE: Chỉ localhost mới xem được Metrics
    networks:
      - inventory-network

  # ==========================================
  # 4. GRAFANA (SECURE PORT)
  # ==========================================
  grafana:
    image: grafana/grafana:latest
    container_name: inventory-grafana
    ports:
      - "127.0.0.1:3000:3000"           # 🔥 SECURE: Chỉ localhost mới vào được Dashboard
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${APP_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - inventory-network

volumes:
  postgres_data:
  grafana_data:
  prometheus_data:

networks:
  inventory-network:
    driver: bridge