name: DevSecOps Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code về
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Chạy unit test
      - name: Run Unit Tests
        run: |
          chmod +x mvnw
          ./mvnw test 

      # 4. Build file .jar
      - name: Build application
        run: ./mvnw clean package

      # 5. Đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. Build image để scan bằng Trivy
      - name: Build Docker Image for Scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ secrets.DOCKER_USERNAME }}/inventory-service:${{ github.sha }}

      # 8. Scan lỗ hổng bằng Trivy
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/inventory-service:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'HIGH,CRITICAL'

      # 9. Push Docker Image (Chỉ chạy khi push main, không chạy khi Pull Request)
      - name: Push Docker Image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/inventory-service:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest

      # 10. SSH vào VPS và Deploy
      - name: Deploy to Production VPS
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Starting Deployment..."
            
            # 1. Vào thư mục chứa docker-compose
            cd ~/inventory-deployment
            
            # 2. Kéo image mới nhất về (vừa push ở bước 9)
            docker compose pull app
            
            # 3. Re-create container (Chỉ update thằng App, Database giữ nguyên)
            docker compose up -d --no-deps --build app
            
            # 4. Dọn dẹp image rác (đỡ tốn dung lượng server)
            docker image prune -f
            
            echo "✅ Deployment Successful!"


      - name: Notify Success
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content": "✅ **Ngon lành cành đào nha <@934324545500893234>!** \nCode mới (`${{ github.event.head_commit.message }}`) đã lên Server thành công! 🚀"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
      
      
      - name: Nofity Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -X POST \
          -d '{"content": "🚨 **<@934324545500893234> DẬY FIX BUG GẤP!!!** \nBuild xịt rồi cha nội ơi! Server chưa update đâu! ☠️\nLog nè: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
          ${{ secrets.DISCORD_WEBHOOK }}