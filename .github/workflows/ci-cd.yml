name: Java CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Lấy code về
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Cài Java 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Cấp quyền & Build ra file .jar (Bước CI cũ)
      - name: Build with Maven
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # --- TỪ ĐÂY LÀ PHẦN CD MỚI THÊM VÀO ---

      # 4. Đăng nhập vào Docker Hub (Dùng chìa khóa trong két sắt)
      - name: Login to Docker Hub
        # Chỉ chạy bước này nếu là push vào main (Pull request thì không cần push image)
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Setup công cụ build Docker xịn (Buildx)
      - name: Set up Docker Buildx
        if: github.event_name != 'pull_request'
        uses: docker/setup-buildx-action@v3

      # 6. Build ảnh và Đẩy lên Docker Hub
      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tự động gắn tag 'latest'
          tags: ${{ secrets.DOCKER_USERNAME }}/inventory-service:latest